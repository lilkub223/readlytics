previews:
  generation: manual

services:
  - type: web
    name: readlytics-web
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./frontend/dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_USER_SERVICE_URL
        fromService:
          type: web
          name: readlytics-user-service
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_READING_SERVICE_URL
        fromService:
          type: web
          name: readlytics-reading-service
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_ANALYTICS_SERVICE_URL
        fromService:
          type: web
          name: readlytics-analytics-service
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: readlytics-user-service
    runtime: node
    plan: free
    rootDir: services/user-service
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: readlytics-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        generateValue: true

  - type: web
    name: readlytics-reading-service
    runtime: python
    plan: free
    rootDir: services/reading-service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: readlytics-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        fromService:
          type: web
          name: readlytics-user-service
          envVarKey: JWT_SECRET

  - type: web
    name: readlytics-analytics-service
    runtime: python
    plan: free
    rootDir: services/analytics-service
    buildCommand: pip install -r requirements.txt
    startCommand: python -m uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: readlytics-db
          property: connectionString
      - key: CORS_ORIGIN
        value: "*"
      - key: JWT_SECRET
        fromService:
          type: web
          name: readlytics-user-service
          envVarKey: JWT_SECRET

databases:
  - name: readlytics-db
    plan: free
    databaseName: book_platform
    user: readlytics
